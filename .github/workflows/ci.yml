name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ClaudeCodeSetupDoctor.slnx

      - name: Build (Debug)
        run: dotnet build ClaudeCodeSetupDoctor.slnx -c Debug --no-restore -warnaserror

      - name: Test (Core + Reporting)
        run: >
          dotnet test tests/SetupDoctor.Core.Tests/SetupDoctor.Core.Tests.csproj
          --no-build --verbosity normal --logger "trx;LogFileName=core-test-results.trx"

      - name: Test (Infrastructure.Windows)
        run: >
          dotnet test tests/SetupDoctor.Infrastructure.Windows.Tests/SetupDoctor.Infrastructure.Windows.Tests.csproj
          --no-build --verbosity normal --logger "trx;LogFileName=infra-test-results.trx"

      - name: Test (Integration)
        run: >
          dotnet test tests/SetupDoctor.IntegrationTests/SetupDoctor.IntegrationTests.csproj
          --no-build --verbosity normal --logger "trx;LogFileName=integration-test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  publish-release:
    # v から始まるタグ push 時のみ実行（例: v0.1.0）
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ClaudeCodeSetupDoctor.slnx

      - name: Publish (win-x64 self-contained single file)
        run: >
          dotnet publish src/SetupDoctor.App/SetupDoctor.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -o publish/win-x64

      - name: Generate SHA-256 checksum
        run: pwsh -File scripts/Generate-Checksum.ps1 -PublishDir publish/win-x64 -OutputDir release

      - name: Create GitHub Release with assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $notesFile = "docs/release_notes/${{ github.ref_name }}.md"
          if (-not (Test-Path $notesFile)) {
            $notesFile = $null
          }
          $ghArgs = @("release", "create", "${{ github.ref_name }}",
            "release/*.exe", "release/*.sha256",
            "--title", "${{ github.ref_name }}",
            "--repo", "${{ github.repository }}")
          if ($notesFile) {
            $ghArgs += @("--notes-file", $notesFile)
          } else {
            $ghArgs += @("--notes", "リリース ${{ github.ref_name }}")
          }
          gh @ghArgs
